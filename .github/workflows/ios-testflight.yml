name: iOS TestFlight Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'vertex_app/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-and-deploy-testflight:
    runs-on: macos-latest
    
    env:
      FLUTTER_VERSION: "3.24.0"
      XCODE_VERSION: "15.4"

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # 3. Install dependencies
      - name: Install Flutter dependencies
        working-directory: ./vertex_app
        run: flutter pub get

      # 4. Setup iOS signing
      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p8-file-base64: ${{ secrets.APPSTORE_API_KEY_P8_BASE64 }}
          p8-password: ${{ secrets.APPSTORE_API_KEY_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
      
      - name: Import provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.example.vertexApp
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # 5. Build iOS app
      - name: Build iOS IPA
        working-directory: ./vertex_app
        run: |
          flutter build ipa \
            --release \
            --export-options-template=ios/ExportOptions.plist \
            --suppress-analytics

      # 6. Upload to TestFlight using App Store Connect API
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'vertex_app/build/ios/ipa/vertex_app.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # 7. Create release notes comment on GitHub
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ iOS build uploaded to TestFlight! Check App Store Connect for details.'
            })

      # 8. Upload artifacts (for debugging)
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: vertex_app/build/ios/ipa/vertex_app.ipa
          retention-days: 30

      # 9. Notify on failure
      - name: Send Slack notification on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'iOS TestFlight build failed!'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author
        continue-on-error: true
