name: iOS TestFlight Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'vertex_app/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

jobs:
  build-and-deploy-testflight:
    runs-on: macos-latest
    
    env:
      FLUTTER_VERSION: "3.41.9"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BUNDLE_ID: com.vertexsolutions.vertexapp
      DEVELOPMENT_TEAM: TMDKN6YV7D
      PROVISIONING_PROFILE_SPECIFIER: "Vertex App TestFlight Profile"

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          APPSTORE_CERT_P12_BASE64: ${{ secrets.APPSTORE_CERT_P12_BASE64 }}
          APPSTORE_CERT_PASSWORD: ${{ secrets.APPSTORE_CERT_PASSWORD }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          missing=0

          check_secret() {
            if [ -z "$2" ]; then
              echo "::error::$1 is not set in GitHub Actions secrets"
              missing=1
            fi
          }

          check_secret "APPSTORE_CERT_P12_BASE64" "$APPSTORE_CERT_P12_BASE64"
          check_secret "APPSTORE_CERT_PASSWORD" "$APPSTORE_CERT_PASSWORD"
          check_secret "APPSTORE_ISSUER_ID" "$APPSTORE_ISSUER_ID"
          check_secret "APPSTORE_API_KEY_ID" "$APPSTORE_API_KEY_ID"
          check_secret "APPSTORE_API_PRIVATE_KEY" "$APPSTORE_API_PRIVATE_KEY"

          exit "$missing"

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # 3. Install dependencies
      - name: Install Flutter dependencies
        working-directory: ./vertex_app
        run: flutter pub get

      # 4. Setup iOS signing (Corrected to use .p12 certificates)
      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERT_PASSWORD }}
      
      - name: Verify signing identities
        run: security find-identity -v -p codesigning

      - name: Import provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.vertexsolutions.vertexapp
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # 5. Build iOS app
      - name: Build iOS IPA
        working-directory: ./vertex_app
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --suppress-analytics \
            --build-number "$GITHUB_RUN_NUMBER"

      - name: Show installed provisioning profiles
        run: ls -la ~/Library/MobileDevice/Provisioning\ Profiles

      # 6. Archive and export IPA using native Xcode
      - name: Archive and Export IPA
        working-directory: ./vertex_app/ios
        run: |
          mkdir -p build

          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            clean archive

          xcodebuild \
            -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/AppStore \
            -exportOptionsPlist ExportOptions.plist

      - name: List exported files
        working-directory: ./vertex_app/ios
        run: find build/AppStore

      # 7. Upload to TestFlight
      - name: Upload IPA to TestFlight
        working-directory: ./vertex_app/ios
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/AppStore/Runner.ipa \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }}
