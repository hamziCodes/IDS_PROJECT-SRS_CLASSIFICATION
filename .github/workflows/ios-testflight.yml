name: iOS TestFlight Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'vertex_app/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

jobs:
  build-and-deploy-testflight:
    runs-on: macos-latest
    
    env:
      FLUTTER_VERSION: "3.41.9"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      BUNDLE_ID: com.vertexsolutions.vertexapp
      DEVELOPMENT_TEAM: TMDKN6YV7D
      PROVISIONING_PROFILE_SPECIFIER: "Vertex App TestFlight Profile"

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          APPSTORE_CERT_P12_BASE64: ${{ secrets.APPSTORE_CERT_P12_BASE64 }}
          APPSTORE_CERT_PASSWORD: ${{ secrets.APPSTORE_CERT_PASSWORD }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          missing=0

          check_secret() {
            if [ -z "$2" ]; then
              echo "::error::$1 is not set in GitHub Actions secrets"
              missing=1
            fi
          }

          check_secret "APPSTORE_CERT_P12_BASE64" "$APPSTORE_CERT_P12_BASE64"
          check_secret "APPSTORE_CERT_PASSWORD" "$APPSTORE_CERT_PASSWORD"
          check_secret "APPSTORE_ISSUER_ID" "$APPSTORE_ISSUER_ID"
          check_secret "APPSTORE_API_KEY_ID" "$APPSTORE_API_KEY_ID"
          check_secret "APPSTORE_API_PRIVATE_KEY" "$APPSTORE_API_PRIVATE_KEY"

          exit "$missing"

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # 3. Install dependencies
      - name: Install Flutter dependencies
        working-directory: ./vertex_app
        run: flutter pub get

      # 3.5 Pre-build diagnostics
      - name: Pre-build iOS diagnostics
        working-directory: ./vertex_app
        run: |
          echo "📱 iOS Build Environment:"
          echo "  Xcode version: $(xcode-select -p)"
          echo "  Flutter version: $(flutter --version)"
          echo "  Dart version: $(dart --version)"
          
          echo ""
          echo "📦 Ensure Flutter iOS artifacts are available (precache):"
          flutter precache --ios

          echo ""
          echo "📦 Pod setup:"
          cd ios
          echo "  Fetching pods..."
          pod repo update
          echo "  Installing pods..."
          pod install --repo-update
          
          # Verify Pods are installed
          if [ -d "Pods" ]; then
            echo "  ✓ Pods directory exists"
            echo "  Installed pods: $(ls Pods | wc -l) packages"
          else
            echo "  ✗ Pods directory not found!"
            exit 1
          fi
          
          cd ..

          echo ""
          echo "🔎 Pod/Flutter diagnostics:" 
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          echo "Listing Flutter engine artifacts (ios-release):"
          ls -la "$FLUTTER_ROOT/bin/cache/artifacts/engine/ios-release/" || echo "No ios-release artifacts found"
          echo "Listing Flutter engine artifacts (ios):"
          ls -la "$FLUTTER_ROOT/bin/cache/artifacts/engine/" || true

          echo "-- Pods-Runner.release.xcconfig --"
          if [ -f "ios/Pods/Target Support Files/Pods-Runner/Pods-Runner.release.xcconfig" ]; then
            sed -n '1,200p' ios/Pods/Target\ Support\ Files/Pods-Runner/Pods-Runner.release.xcconfig || true
          else
            echo "Pods-Runner.release.xcconfig not found"
          fi

          echo "-- Pods-Runner.profile.xcconfig --"
          if [ -f "ios/Pods/Target Support Files/Pods-Runner/Pods-Runner.profile.xcconfig" ]; then
            sed -n '1,200p' ios/Pods/Target\ Support\ Files/Pods-Runner/Pods-Runner.profile.xcconfig || true
          else
            echo "Pods-Runner.profile.xcconfig not found"
          fi

          echo "-- Podfile.lock (summary) --"
          if [ -f "ios/Podfile.lock" ]; then
            sed -n '1,200p' ios/Podfile.lock || true
          else
            echo "Podfile.lock not found"
          fi
          
          echo ""
          echo "📋 ExportOptions.plist:"
          if plutil -lint ios/ExportOptions.plist > /dev/null 2>&1; then
            echo "  ✓ ExportOptions.plist is valid XML"
          else
            echo "  ✗ ExportOptions.plist has XML errors!"
            plutil -lint ios/ExportOptions.plist
            exit 1
          fi

      # 4. Setup iOS signing (Corrected to use .p12 certificates)
      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERT_PASSWORD }}
      
      - name: Verify signing identities
        run: security find-identity -v -p codesigning

      - name: Import provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.vertexsolutions.vertexapp
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # 5. Build iOS app with verbose output
      - name: Build iOS IPA
        working-directory: ./vertex_app
        run: |
          set -euo pipefail

          # Clean previous builds
          rm -rf build

          # Build with verbose output to catch real errors
          flutter build ios \
            --release \
            --no-codesign \
            --suppress-analytics \
            --build-number "$GITHUB_RUN_NUMBER" \
            --verbose 2>&1 | tee build.log

          # Check if build succeeded (pipefail makes the pipeline return a non-zero code on failure)
          if [ $? -ne 0 ]; then
            echo "::error::iOS build failed. See logs above for details."
            echo "::group::Build Log (last 100 lines)"
            tail -n 100 build.log
            echo "::endgroup::"
            exit 1
          fi

      - name: Show installed provisioning profiles
        run: ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No provisioning profiles found"
      
      - name: Verify Runner.app exists
        working-directory: ./vertex_app
        run: |
          if [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            echo "✓ Runner.app built successfully"
            ls -la build/ios/Release-iphoneos/Runner.app | head -20
          else
            echo "✗ Runner.app not found!"
            find build/ios -name "*.app" -type d || echo "No .app files found"
            exit 1
          fi

      # 6. Archive and export IPA using native Xcode
      - name: Archive and Export IPA
        working-directory: ./vertex_app/ios
        run: |
          set -euo pipefail

          mkdir -p build

          # Clean previous archives
          rm -rf build/Runner.xcarchive build/AppStore

          echo "🔍 Listing current build directory contents..."
          ls -la build/ || true

          echo "📦 Creating Xcode archive..."
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_SPECIFIER" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            GCC_TREAT_WARNINGS_AS_ERRORS=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            clean archive 2>&1 | tee archive.log

          if [ $? -ne 0 ]; then
            echo "::error::Xcode archive failed!"
            echo "::group::Archive Log (last 150 lines)"
            tail -n 150 archive.log
            echo "::endgroup::"
            exit 1
          fi

          echo "✓ Archive created successfully"
          ls -lah build/Runner.xcarchive/

          echo "📤 Exporting archive to IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/AppStore \
            -exportOptionsPlist ExportOptions.plist \
            2>&1 | tee export.log

          if [ $? -ne 0 ]; then
            echo "::error::IPA export failed!"
            echo "::group::Export Log (last 150 lines)"
            tail -n 150 export.log
            echo "::endgroup::"
            exit 1
          fi

          echo "✓ IPA exported successfully"

      - name: List exported files
        working-directory: ./vertex_app/ios
        run: |
          echo "📂 Build output structure:"
          find build -type f -name "*.ipa" -o -name "*.app" | head -20
          
          if [ -f "build/AppStore/Runner.ipa" ]; then
            echo "✓ IPA file ready: $(du -h build/AppStore/Runner.ipa | cut -f1)"
          else
            echo "✗ IPA file not found!"
            ls -la build/AppStore/
            exit 1
          fi

      # 7. Upload to TestFlight
      - name: Upload IPA to TestFlight
        working-directory: ./vertex_app/ios
        run: |
          echo "📤 Uploading to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file build/AppStore/Runner.ipa \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_ISSUER_ID }} \
            --show-progress
          
          if [ $? -eq 0 ]; then
            echo "✓ Upload successful! Build should appear in TestFlight in 5-10 minutes."
          else
            echo "✗ Upload failed!"
            exit 1
          fi

      # 8. Upload build log as artifact (for debugging)
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: vertex_app/build.log
          retention-days: 7
        continue-on-error: true

      # 9. Notify on success
      - name: Build Success Summary
        if: success()
        run: |
          echo "✅ iOS TestFlight Build Successful!"
          echo ""
          echo "📊 Build Summary:"
          echo "  • Build Number: $GITHUB_RUN_NUMBER"
          echo "  • Bundle ID: $BUNDLE_ID"
          echo "  • Team ID: $DEVELOPMENT_TEAM"
          echo "  • Profile: $PROVISIONING_PROFILE_SPECIFIER"
          echo ""
          echo "⏱️  TestFlight should have your build ready in 5-10 minutes."
          echo "📱 Check App Store Connect → Your App → TestFlight to download."
          echo ""
          echo "🔗 View build: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      # 10. On failure, provide troubleshooting info
      - name: Troubleshooting Info on Failure
        if: failure()
        run: |
          echo "❌ Build failed! Here's what to check:"
          echo ""
          echo "1. 📋 Review the logs above for the actual error message"
          echo "2. 🔑 Verify all GitHub secrets are set correctly"
          echo "3. 📱 Check that your provisioning profile is valid"
          echo "4. 📦 Ensure all dependencies are compatible"
          echo "5. 🎯 Verify Bundle ID matches App Store Connect"
          echo ""
          echo "📚 See CI_CD/TROUBLESHOOTING.md for detailed help"
          echo "🔗 Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
