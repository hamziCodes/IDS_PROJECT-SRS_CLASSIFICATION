name: iOS TestFlight Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'vertex_app/**'
      - '.github/workflows/ios-testflight.yml'
  workflow_dispatch:

jobs:
  build-and-deploy-testflight:
    runs-on: macos-latest
    
    env:
      FLUTTER_VERSION: "3.41.9"

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # 3. Install dependencies
      - name: Install Flutter dependencies
        working-directory: ./vertex_app
        run: flutter pub get

      # 4. Setup iOS signing (Corrected to use .p12 certificates)
      - name: Import certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPSTORE_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERT_PASSWORD }}
      
      - name: Import provisioning profile
        uses: apple-actions/download-provisioning-profiles@v1
        with:
          bundle-id: com.vertexsolutions.vertexapp
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

      # 5. Build iOS app
      - name: Build iOS IPA
        working-directory: ./vertex_app
        run: flutter build ipa --release --export-method=app-store --export-options-plist=ios/ExportOptions.plist --suppress-analytics

      # 6. Upload to TestFlight using App Store Connect API
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'vertex_app/build/ios/ipa/vertex_app.ipa'
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}